<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login - LogTudo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&family=Space+Grotesk:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body class="admin-body">
    <div class="login-card">
      <div class="login-title">Acesso Livre</div>
      <p>A autenticacao desta area foi removida.</p>
      <button class="btn primary" id="btnOpenLogs" type="button">Abrir Logs</button>
    </div>

    <script>
      document.getElementById("btnOpenLogs").addEventListener("click", () => {
        const basePath = (window.LOGTUDO_BASE_PATH || "").replace(/\/+$/, "");
        const target = basePath ? `${basePath}/logs-FaturamentosAdicionais` : "/logs-FaturamentosAdicionais";
        window.location.href = target;
      });
    </script>
  </body>
</html>
