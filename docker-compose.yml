services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faturamentos-backend
    restart: unless-stopped
    expose:
      - '8000'
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=America/Sao_Paulo
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
    volumes:
      - ./webapp/uploads:/app/webapp/uploads
    labels:
      - traefik.enable=true
      - "traefik.http.routers.faturamentos.rule=Host(`${APP_HOST:-localhost}`)"
      - traefik.http.routers.faturamentos.entrypoints=http
      - traefik.http.services.faturamentos.loadbalancer.server.port=8000
    healthcheck:
      test:
        - CMD-SHELL
        - 'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')" || exit 1'
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    container_name: faturamentos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U postgres'
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
